name: Build EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24 per tutte le action

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Read version from source
        id: version
        run: |
          $ver = (Select-String -Path "weld_viewer.pyw" -Pattern 'APP_VERSION\s*=\s*"(.+)"').Matches.Groups[1].Value
          echo "ver=$ver" >> $env:GITHUB_OUTPUT
          echo "Version: $ver"

      - name: Embed manual.html into .pyw
        run: python embed_manual.py

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller --onefile --windowed --icon=icon.ico --name "WeldDetector_v${{ steps.version.outputs.ver }}" weld_viewer.pyw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WeldDetector-v${{ steps.version.outputs.ver }}-Windows
          path: dist/WeldDetector_v${{ steps.version.outputs.ver }}.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ver = "${{ steps.version.outputs.ver }}"
          $tag = "${{ github.ref_name }}"
          $exe = "dist/WeldDetector_v$ver.exe"
          $notes = @"
          ## WeldDetector v$ver

          ### Installazione
          Scarica ``WeldDetector_v$ver.exe`` e avvialo direttamente.
          Non richiede installazione di Python o librerie aggiuntive.

          ### Note
          Il file ``WeldDetecto.ini`` viene creato automaticamente in ``C:\ProgramData\WeldDetecto\`` al primo avvio.
          "@
          $notesFile = "release_notes.md"
          Set-Content -Path $notesFile -Value $notes -Encoding utf8
          if (gh release view $tag 2>$null) {
            gh release upload $tag $exe --clobber
            gh release edit $tag --title "WeldDetector v$ver" --notes-file $notesFile
          } else {
            gh release create $tag $exe --title "WeldDetector v$ver" --notes-file $notesFile
          }
